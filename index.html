<script type="text/javascript">
    const URL = "https://teachablemachine.withgoogle.com/models/ogbyTMLUO/";[cite: 1]

    let model, webcam, labelContainer, maxPredictions;
    let isPlaying = false;

    async function init() {
        const startBtn = document.getElementById("start-btn");
        startBtn.disabled = true;
        startBtn.innerText = "กำลังโหลดโมเดล...";

        try {
            const modelURL = URL + "model.json";[cite: 1]
            const metadataURL = URL + "metadata.json";[cite: 1]

            // โหลดโมเดล
            model = await tmImage.load(modelURL, metadataURL);[cite: 1]
            maxPredictions = model.getTotalClasses();[cite: 1]

            // ตั้งค่ากล้องเว็บแคม
            const flip = true;[cite: 1]
            webcam = new tmImage.Webcam(200, 200, flip);[cite: 1]
            
            // รอเปิดกล้อง (หากผู้ใช้ยังไม่อนุญาต สิทธิ์จะค้างที่บรรทัดนี้)
            await webcam.setup();[cite: 1]
            await webcam.play();[cite: 1]
            isPlaying = true;

            // เล่นการอัปเดตภาพกล้องหลักเพื่อให้กล้องไม่ค้าง
            window.requestAnimationFrame(loop);

            // แสดงผลกล้องในเว็บ
            document.getElementById("webcam-container").innerHTML = "";
            document.getElementById("webcam-container").appendChild(webcam.canvas);[cite: 1]
            
            // เตรียมพื้นที่แสดงผล
            labelContainer = document.getElementById("label-container");[cite: 1]
            labelContainer.innerHTML = "";
            for (let i = 0; i < maxPredictions; i++) {[cite: 1]
                const div = document.createElement("div");
                div.className = "label-row";
                labelContainer.appendChild(div);[cite: 1]
            }

            startBtn.innerText = "ระบบกำลังทำงาน (ทำนายผลทุก 3 วิ)";

            // แยกส่วนการทำนายผลออกมาทำงานทุกๆ 3 วินาที
            setInterval(async () => {
                if(isPlaying) {
                    await predict();[cite: 1]
                }
            }, 3000);

        } catch (error) {
            console.error(error);
            alert("ไม่สามารถเปิดกล้องได้: กรุณาตรวจสอบสิทธิ์การเข้าถึงกล้องบนบราวเซอร์ของคุณ");
            startBtn.disabled = false;
            startBtn.innerText = "เปิดกล้องเริ่มต้นการทำงาน";
        }
    }

    function loop() {
        if(isPlaying) {
            webcam.update(); // อัปเดตเฟรมภาพต่อเนื่องเพื่อให้กล้องทำงานลื่นไหล[cite: 1]
            window.requestAnimationFrame(loop);
        }
    }

    async function predict() {[cite: 1]
        const prediction = await model.predict(webcam.canvas);[cite: 1]
        for (let i = 0; i < maxPredictions; i++) {[cite: 1]
            const className = prediction[i].className;[cite: 1]
            const probability = (prediction[i].probability * 100).toFixed(0) + "%";
            labelContainer.childNodes[i].innerHTML = `<span>${className}</span> <span>${probability}</span>`;
        }
    }
</script>
