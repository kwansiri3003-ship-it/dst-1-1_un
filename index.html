<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine Image Model</title>
    
    <!-- นำเข้า Google Fonts เพื่อความสวยงาม -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Sarabun', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }

        h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .btn-start {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
            margin-bottom: 20px;
            width: 100%;
        }

        .btn-start:hover {
            background-color: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.4);
        }

        .btn-start:disabled {
            background-color: #cccccc;
            color: #666666;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        #webcam-container {
            margin: 20px auto;
            border: 4px solid #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            width: 200px;
            height: 200px;
            background-color: #eee;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #label-container {
            margin-top: 20px;
            text-align: left;
        }

        .label-row {
            background: #f8f9fa;
            padding: 10px 15px;
            margin: 8px 0;
            border-radius: 8px;
            border-left: 4px solid #4CAF50;
            display: flex;
            justify-content: space-between;
            font-weight: 500;
            color: #444;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Teachable Machine Image Model</h2>
    <button type="button" class="btn-start" id="start-btn" onclick="init()">เปิดกล้องเริ่มต้นการทำงาน</button>
    
    <div id="webcam-container">
        <!-- กล้องจะแสดงตรงนี้ -->
    </div>
    <div id="label-container">
        <!-- ผลลัพธ์จะแสดงตรงนี้ -->
    </div>
</div>

<!-- เรียกใช้คลังสคริปต์ภายนอก -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script type="text/javascript">
    // ลิงก์โมเดล Teachable Machine ของคุณ
    const URL = "https://teachablemachine.withgoogle.com/models/ogbyTMLUO/";

    let model, webcam, labelContainer, maxPredictions;
    let isPlaying = false;

    async function init() {
        const startBtn = document.getElementById("start-btn");
        startBtn.disabled = true;
        startBtn.innerText = "กำลังโหลดโมเดล...";

        try {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            // โหลดโมเดลและเมทาดาตา
            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            // ตั้งค่าเว็บแคม
            const flip = true;
            webcam = new tmImage.Webcam(200, 200, flip);
            
            // ขอกระบวนการเข้าถึงและเปิดกล้อง
            await webcam.setup();
            await webcam.play();
            isPlaying = true;

            // รัน Loop หลักเพื่อแสดงผลกล้องให้สมูทต่อเนื่อง
            window.requestAnimationFrame(loop);

            // นำวิดีโอกล้องมาฝังในหน้าเว็บ
            document.getElementById("webcam-container").innerHTML = "";
            document.getElementById("webcam-container").appendChild(webcam.canvas);
            
            // เตรียมหน้าต่างแสดงข้อความผลลัพธ์
            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = "";
            for (let i = 0; i < maxPredictions; i++) {
                const div = document.createElement("div");
                div.className = "label-row";
                labelContainer.appendChild(div);
            }

            startBtn.innerText = "ระบบกำลังทำงาน (ทำนายผลทุก 3 วิ)";

            // ตั้งเวลาทำการวิเคราะห์ (Predict) ภาพทุกๆ 3 วินาที (3000 มิลลิวินาที)
            setInterval(async () => {
                if (isPlaying) {
                    await predict();
                }
            }, 3000);

        } catch (error) {
            console.error(error);
            alert("เกิดข้อผิดพลาด: โปรดตรวจสอบว่าคุณได้กดอนุญาตให้เว็บไซต์เข้าถึงกล้องแล้ว หรือไม่มีโปรแกรมอื่นเปิดกล้องค้างไว้");
            startBtn.disabled = false;
            startBtn.innerText = "เปิดกล้องเริ่มต้นการทำงาน";
        }
    }

    function loop() {
        if (isPlaying) {
            webcam.update(); // อัปเดตเฟรมภาพต่อเนื่องเพื่อให้ภาพเคลื่อนไหวไม่ค้าง
            window.requestAnimationFrame(loop);
        }
    }

    async function predict() {
        // ประมวลผลรูปภาพปัจจุบันผ่านโมเดล AI
        const prediction = await model.predict(webcam.canvas);
        for (let i = 0; i < maxPredictions; i++) {
            const className = prediction[i].className;
            const probability = (prediction[i].probability * 100).toFixed(0) + "%";
            labelContainer.childNodes[i].innerHTML = `<span>${className}</span> <span>${probability}</span>`;
        }
    }
</script>

</body>
</html>
