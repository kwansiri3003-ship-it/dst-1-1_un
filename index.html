<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine Image Model</title>
    
    <!-- นำเข้า Google Fonts เพื่อความสวยงาม -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Sarabun', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }

        h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .btn-start {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
            margin-bottom: 20px;
        }

        .btn-start:hover {
            background-color: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.4);
        }

        .btn-start:disabled {
            background-color: #cccccc;
            color: #666666;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        #webcam-container {
            margin: 20px auto;
            border: 4px solid #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            width: 200px;
            height: 200px;
            background-color: #eee;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #label-container {
            margin-top: 20px;
            text-align: left;
        }

        .label-row {
            background: #f8f9fa;
            padding: 10px 15px;
            margin: 8px 0;
            border-radius: 8px;
            border-left: 4px solid #4CAF50;
            display: flex;
            justify-content: space-between;
            font-weight: 500;
            color: #444;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Teachable Machine Image Model</h2>
    <button type="button" class="btn-start" id="start-btn" onclick="init()">เปิดกล้องเริ่มต้นการทำงาน</button>
    
    <div id="webcam-container">
        <!-- กล้องจะแสดงตรงนี้ -->
    </div>
    <div id="label-container">
        <!-- ผลลัพธ์จะแสดงตรงนี้ -->
    </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script type="text/javascript">
    // ลิงก์โมเดลของคุณจากระบบ[cite: 1]
    const URL = "https://teachablemachine.withgoogle.com/models/ogbyTMLUO/";[cite: 1]

    let model, webcam, labelContainer, maxPredictions;
    let updateInterval;

    async function init() {
        // ปิดปุ่มกดเพื่อป้องกันการกดซ้ำ
        document.getElementById("start-btn").disabled = true;
        document.getElementById("start-btn").innerText = "กำลังโหลดโมเดล...";

        const modelURL = URL + "model.json";[cite: 1]
        const metadataURL = URL + "metadata.json";[cite: 1]

        // โหลดโมเดล
        model = await tmImage.load(modelURL, metadataURL);[cite: 1]
        maxPredictions = model.getTotalClasses();[cite: 1]

        // ตั้งค่ากล้องเว็บแคม
        const flip = true;[cite: 1]
        webcam = new tmImage.Webcam(200, 200, flip); // กว้าง, สูง, พลิกซ้ายขวา[cite: 1]
        await webcam.setup();[cite: 1]
        await webcam.play();[cite: 1]

        // แสดงผลกล้องในเว็บ
        document.getElementById("webcam-container").innerHTML = "";
        document.getElementById("webcam-container").appendChild(webcam.canvas);[cite: 1]
        
        // เตรียมพื้นที่แสดงผลป้ายกำกับ (Label)
        labelContainer = document.getElementById("label-container");[cite: 1]
        labelContainer.innerHTML = "";
        for (let i = 0; i < maxPredictions; i++) {[cite: 1]
            const div = document.createElement("div");
            div.className = "label-row";
            labelContainer.appendChild(div);[cite: 1]
        }

        document.getElementById("start-btn").innerText = "ระบบกำลังทำงาน (ทุกๆ 3 วิ)";

        // สั่งให้ดึงภาพจากกล้องและทำนายผลทุกๆ 3 วินาที (3000 มิลลิวินาที)
        updateInterval = setInterval(async () => {
            webcam.update(); // ดึงเฟรมภาพใหม่จากกล้อง[cite: 1]
            await predict(); // เรียกฟังก์ชันทำนายผล[cite: 1]
        }, 3000);
    }

    // ฟังก์ชันทำนายผลภาพจากกล้อง
    async function predict() {[cite: 1]
        const prediction = await model.predict(webcam.canvas);[cite: 1]
        for (let i = 0; i < maxPredictions; i++) {[cite: 1]
            // แยกชื่อคลาสและคะแนนความมั่นใจ
            const className = prediction[i].className;[cite: 1]
            const probability = (prediction[i].probability * 100).toFixed(0) + "%"; // แสดงผลเป็น % เพื่อความสวยงาม
            
            // อัปเดตข้อมูลลงหน้าเว็บ
            labelContainer.childNodes[i].innerHTML = `<span>${className}</span> <span>${probability}</span>`;
        }
    }
</script>

</body>
</html>
